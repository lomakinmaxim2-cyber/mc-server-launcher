name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r dev-requirements.txt pyflakes
      - name: Lint (catch undefined names before building)
        run: python -m pyflakes mc_server_launcher_9.py

      - name: Build exe
        run: python build.py

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MCServerLauncher.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

